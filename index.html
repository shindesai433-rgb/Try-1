<!DOCTYPE html>
<h1>Working</h1>
<html>
<head>
<title>Chat Planner</title>

<style>
body {
    font-family: Arial;
    background: #FFF7F2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.chat {
    width: 320px;
    height: 500px;
    background: white;
    border-radius: 20px;
    padding: 15px;
    overflow-y: auto;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.msg {
    background: #FFE680;
    padding: 10px;
    border-radius: 15px;
    margin: 8px 0;
    max-width: 80%;
}

.user {
    background: #F26A6A;
    color: white;
    margin-left: auto;
}

button {
    display: block;
    margin: 6px 0;
    padding: 8px;
    border: none;
    border-radius: 15px;
    background: #eee;
    cursor: pointer;
}

button:hover {
    background: #F26A6A;
    color: white;
}
</style>

</head>

<body>

<div class="chat" id="chat"></div>

<script>

const chat = document.getElementById("chat");

const formURL = "https://docs.google.com/forms/d/e/1FAIpQLSeX-dbXnkfHLZc1C2iPt4w0nFAWU2HsDkqLSaawQ__MHafpZA/formResponse";

const entries = [
"entry.1348966713",
"entry.277450266",
"entry.18817334",
"entry.1888383627"
];

let answers = [];
let current = 0;

const steps = [
{
q: "hey\n\nlet’s plan something… slowly\njust what feels right",
a: ["okay"]
},
{
q: "what would you feel like doing",
a: [
"sitting somewhere with coffee and just talking",
"a movie where we barely watch the movie",
"I’ll let you surprise me"
]
},
{
q: "when would this feel the nicest",
a: ["a calm morning","an easy evening","a slow night"]
},
{
q: "what sounds good with that",
a: [
"something simple and street style",
"a proper sit-down meal",
"just desserts and conversations"
]
},
{
q: "what kind of mood do you want it to have",
a: [
"a lot of laughing",
"both",
"a little soft and romantic"
]
}
];

function addMessage(text, className="msg") {
    const div = document.createElement("div");
    div.className = className;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function showOptions(options) {
    const div = document.createElement("div");

    options.forEach(opt => {
        const btn = document.createElement("button");
        btn.innerText = opt;
        btn.onclick = () => {
            addMessage(opt, "msg user");
            div.remove();

            if(current > 0) answers.push(opt);

            nextStep();
        };
        div.appendChild(btn);
    });

    chat.appendChild(div);
}

function sendToGoogleForm() {
    let formData = new FormData();

    entries.forEach((entry, i) => {
        formData.append(entry, answers[i]);
    });

    fetch(formURL, {
        method: "POST",
        mode: "no-cors",
        body: formData
    });
}

function nextStep() {
    current++;

    if (current < steps.length) {
        setTimeout(() => {
            addMessage(steps[current].q);
            showOptions(steps[current].a);
        }, 600);
    } else {
        sendToGoogleForm();

        setTimeout(() => {
            addMessage("okay\n\nI’ll take this seriously\nand try to get it right");
        }, 600);
    }
}

addMessage(steps[0].q);
showOptions(steps[0].a);

</script>

</body>
</html>
